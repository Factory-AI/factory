name: Sync Japanese Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.mdx'
      - 'docs/**/*.md'
      - '!docs/jp/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-jp-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync changed English docs to Japanese
        id: sync
        run: |
          changed_files=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'docs/**/*.mdx' 'docs/**/*.md' ':!docs/jp/**')

          if [ -z "$changed_files" ]; then
            echo "No English doc changes detected."
            echo "synced=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          synced=false
          while IFS= read -r file; do
            # Build corresponding JP path: docs/foo/bar.mdx -> docs/jp/foo/bar.mdx
            jp_file="${file/docs\//docs/jp/}"

            mkdir -p "$(dirname "$jp_file")"
            cp "$file" "$jp_file"
            echo "Synced: $file -> $jp_file"
            synced=true
          done <<< "$changed_files"

          if [ "$synced" = true ]; then
            echo "synced=true" >> $GITHUB_OUTPUT
          else
            echo "synced=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with synced docs
        if: steps.sync.outputs.synced == 'true'
        run: |
          BRANCH="docs/auto-sync-jp-docs-$(date +%Y%m%d-%H%M%S)"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add docs/jp/
          git commit -m "docs: sync English doc changes to Japanese"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: sync English doc changes to Japanese" \
            --body "Auto-generated by the sync-jp-docs workflow. English documentation changes have been copied to the Japanese docs directory. These files should be reviewed and translated."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ "${{ steps.sync.outputs.synced }}" == "true" ]; then
            echo "✅ Japanese docs sync PR created"
          else
            echo "ℹ️ No English doc changes to sync"
          fi
