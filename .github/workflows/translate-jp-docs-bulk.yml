name: Bulk Translate Japanese Docs

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Translate all Japanese docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_DOCS }}
        run: |
          python .github/scripts/translate-docs.py --all

      - name: Create PR with translations
        run: |
          BRANCH="docs/bulk-translate-jp-$(date +%Y%m%d-%H%M%S)"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add docs/jp/
          if git diff --cached --quiet; then
            echo "No translation changes detected."
            exit 0
          fi
          git commit -m "docs: bulk translate Japanese documentation"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: bulk translate Japanese documentation to Japanese" \
            --body "Auto-generated bulk translation of all Japanese docs. Please review translations for accuracy."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
