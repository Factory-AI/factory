name: Bulk Translate Japanese Docs

on:
  workflow_dispatch:

concurrency:
  group: translate-jp-docs-bulk
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Droid CLI
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Translate all Japanese docs
        id: translate
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
        run: |
          set -euo pipefail

          BRANCH="docs/bulk-translate-jp"
          TITLE="docs: bulk translate Japanese documentation"

          git fetch origin main
          git fetch origin "$BRANCH" || true
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -B "$BRANCH" "origin/main"

          droid exec --auto low -f .github/prompts/translate-jp-docs-bulk.md
          git add docs/jp/
          if git diff --cached --quiet; then
            echo "No translation changes detected."
            echo "translated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "branch=$BRANCH"
            echo "title=$TITLE"
            echo "translated=true"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert PR with translations
        id: pr
        if: steps.translate.outputs.translated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ steps.translate.outputs.branch }}"
          TITLE="${{ steps.translate.outputs.title }}"
          BODY="Auto-generated bulk translation of all Japanese docs via Droid Exec. Please review translations for accuracy."
          REPO_OWNER="${{ github.repository_owner }}"

          find_pr_number() {
            local state="$1"
            gh pr list \
              --base main \
              --state "$state" \
              --limit 100 \
              --json number,headRefName,isCrossRepository,headRepositoryOwner \
              --jq ".[] | select(.headRefName == \"$BRANCH\" and (.isCrossRepository | not) and .headRepositoryOwner.login == \"$REPO_OWNER\") | .number" \
              | head -n 1
          }

          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"

          open_pr="$(find_pr_number open)"
          if [ -n "$open_pr" ] && [ "$open_pr" != "null" ]; then
            gh pr edit "$open_pr" --title "$TITLE" --body "$BODY"
            {
              echo "pr_number=$open_pr"
              echo "action=updated"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          closed_pr="$(find_pr_number closed)"
          if [ -n "$closed_pr" ] && [ "$closed_pr" != "null" ]; then
            gh pr reopen "$closed_pr"
            gh pr edit "$closed_pr" --title "$TITLE" --body "$BODY"
            {
              echo "pr_number=$closed_pr"
              echo "action=reopened"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$BODY"

          created_pr="$(find_pr_number open)"
          {
            echo "pr_number=$created_pr"
            echo "action=created"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          if [ "${{ steps.translate.outputs.translated }}" != "true" ]; then
            echo "ℹ️ No bulk Japanese docs changes to sync"
            exit 0
          fi

          echo "✅ Bulk Japanese docs PR ${{ steps.pr.outputs.action }} (#${{ steps.pr.outputs.pr_number }})"
